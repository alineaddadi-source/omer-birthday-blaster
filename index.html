<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Omer 12 – Birthday Blaster</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #0a0a1a;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  min-height: 100vh;
  font-family: 'Segoe UI', Arial, sans-serif;
  overflow: hidden;
  touch-action: none;
}
canvas {
  display: block;
  border: 2px solid #4a2080;
  border-radius: 8px;
  box-shadow: 0 0 30px #7a30c0;
}
#ui {
  position: fixed; top: 0; left: 0; right: 0; bottom: 0;
  pointer-events: none;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
}
.screen {
  background: rgba(10,10,30,0.97);
  border: 2px solid #7a30c0;
  border-radius: 16px;
  padding: 30px 40px;
  text-align: center;
  color: #fff;
  max-width: 380px;
  width: 90%;
  pointer-events: all;
  box-shadow: 0 0 40px #7a30c050;
}
.screen h1 { font-size: 1.6em; color: #f0a0ff; margin-bottom: 8px; }
.screen h2 { font-size: 1.1em; color: #c080ff; margin-bottom: 20px; font-weight: normal; }
.screen p  { color: #b0b0d0; margin-bottom: 16px; font-size: 0.95em; line-height: 1.6; }
.btn {
  display: inline-block;
  background: linear-gradient(135deg, #7a30c0, #c040e0);
  color: #fff; border: none; border-radius: 24px;
  padding: 12px 32px; font-size: 1em; cursor: pointer;
  margin: 6px; transition: transform 0.1s, box-shadow 0.1s;
  box-shadow: 0 4px 15px #7a30c060;
}
.btn:hover { transform: scale(1.05); box-shadow: 0 6px 20px #c040e080; }
.btn:active { transform: scale(0.97); }
.btn.secondary { background: linear-gradient(135deg, #303060, #505090); }
#howto { display: none; }
#modal {
  background: rgba(10,10,30,0.98);
  border: 2px solid #f0a0ff;
  border-radius: 16px;
  padding: 36px 44px;
  text-align: center;
  color: #fff;
  max-width: 340px;
  width: 85%;
  pointer-events: all;
  display: none;
}
#modal .msg { font-size: 2em; margin-bottom: 16px; }
#modal .sub { color: #c0c0e0; margin-bottom: 20px; font-size: 1em; }
#hud {
  position: fixed; top: 0; left: 0; right: 0;
  display: flex; justify-content: space-between; align-items: center;
  padding: 8px 16px;
  background: rgba(10,10,30,0.8);
  color: #fff; font-size: 1em;
  pointer-events: none;
  display: none;
}
#hud span { font-size: 0.85em; color: #c0a0ff; }
#mobile-controls {
  position: fixed; bottom: 0; left: 0; right: 0;
  display: none;
  justify-content: space-between; align-items: flex-end;
  padding: 10px 16px 14px;
  pointer-events: all;
  z-index: 10;
}
.ctrl-btn {
  background: rgba(122,48,192,0.7);
  color: #fff; border: 2px solid #7a30c0;
  border-radius: 50%; width: 64px; height: 64px;
  font-size: 1.5em; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  -webkit-tap-highlight-color: transparent;
  user-select: none;
}
.ctrl-btn:active { background: rgba(192,64,224,0.8); }
#shoot-btn {
  background: rgba(192,64,64,0.7);
  border-color: #c04040;
  border-radius: 32px;
  width: 80px; height: 54px;
  font-size: 0.85em;
}
#mute-btn {
  position: fixed; top: 8px; right: 8px;
  background: rgba(122,48,192,0.6);
  color: #fff; border: 1px solid #7a30c0;
  border-radius: 20px; padding: 4px 10px;
  cursor: pointer; font-size: 0.85em;
  z-index: 100; pointer-events: all;
}
#confetti-canvas {
  position: fixed; top: 0; left: 0;
  pointer-events: none; z-index: 200;
  display: none;
}
</style>
</head>
<body>

<canvas id="game"></canvas>

<div id="hud">
  <div>ניקוד: <strong id="score-hud">0</strong></div>
  <div id="lives-hud">❤️❤️❤️❤️❤️</div>
  <div>הודעה הבאה: <span id="next-hud">20</span></div>
</div>

<div id="ui">
  <!-- Start Screen -->
  <div class="screen" id="start-screen">
    <h1>🚀 Omer 12<br>Birthday Blaster</h1>
    <h2>הורידי כמה שיותר בלונים ולבבות!</h2>
    <button class="btn" id="start-btn">התחילי לשחק!</button>
    <button class="btn secondary" id="howto-btn">איך משחקים?</button>
    <div id="howto">
      <p>
        🖥️ <strong>מחשב:</strong> חצים להזזה, רווח לירייה<br>
        📱 <strong>מובייל:</strong> כפתורים על המסך<br>
        🎈 פגעי ב-בלונים ולבבות כדי לצבור נקודות<br>
        💔 אם 5 עצמים מגיעים לתחתית — המשחק נגמר
      </p>
    </div>
  </div>

  <!-- Modal for birthday messages -->
  <div id="modal">
    <div class="msg" id="modal-msg"></div>
    <div class="sub" id="modal-sub"></div>
    <button class="btn" id="modal-continue">המשיכי! 🚀</button>
  </div>

  <!-- Game Over Screen -->
  <div class="screen" id="over-screen" style="display:none">
    <h1>נתראה ביום הולדת הבאה 🎂</h1>
    <p id="final-score"></p>
    <button class="btn" id="restart-btn">שחקי שוב</button>
  </div>
</div>

<!-- Mobile controls -->
<div id="mobile-controls">
  <button class="ctrl-btn" id="left-btn">◀</button>
  <button class="ctrl-btn" id="shoot-btn">ירי 🔫</button>
  <button class="ctrl-btn" id="right-btn">▶</button>
</div>

<button id="mute-btn">🔊</button>
<canvas id="confetti-canvas"></canvas>

<script>
// ─── Audio ───────────────────────────────────────────────────────────────
const AC = new (window.AudioContext || window.webkitAudioContext)();
let muted = localStorage.getItem('omer12-mute') === '1';
const muteBtn = document.getElementById('mute-btn');
muteBtn.textContent = muted ? '🔇' : '🔊';
muteBtn.onclick = () => {
  muted = !muted;
  localStorage.setItem('omer12-mute', muted ? '1' : '0');
  muteBtn.textContent = muted ? '🔇' : '🔊';
};

function beep(freq, type, dur, vol = 0.3) {
  if (muted) return;
  if (AC.state === 'suspended') AC.resume();
  const o = AC.createOscillator();
  const g = AC.createGain();
  o.connect(g); g.connect(AC.destination);
  o.type = type; o.frequency.value = freq;
  g.gain.setValueAtTime(vol, AC.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001, AC.currentTime + dur);
  o.start(); o.stop(AC.currentTime + dur);
}
function sfxShoot()     { beep(880, 'square', 0.08, 0.15); }
function sfxHit()       { beep(440, 'sine', 0.12, 0.25); beep(660, 'sine', 0.08, 0.2); }
function sfxMiss()      { beep(150, 'sawtooth', 0.25, 0.3); }
function sfxMilestone() { [523,659,784,1047].forEach((f,i)=>setTimeout(()=>beep(f,'sine',0.2,0.3),i*100)); }
function sfxGameOver()  { [400,300,200,150].forEach((f,i)=>setTimeout(()=>beep(f,'sawtooth',0.3,0.4),i*150)); }

// Simple background music loop
let bgNodes = [];
function startMusic() {
  if (muted) return;
  stopMusic();
  if (AC.state === 'suspended') AC.resume();
  const notes = [523,587,659,698,784,880,988,1047];
  const pattern = [0,2,4,5,7,5,4,2,0,4,7,4,2,5,9,7];
  let step = 0;
  function playNote() {
    if (muted) { bgNodes = []; return; }
    const o = AC.createOscillator();
    const g = AC.createGain();
    o.connect(g); g.connect(AC.destination);
    o.type = 'triangle';
    o.frequency.value = notes[pattern[step % pattern.length]];
    g.gain.setValueAtTime(0.06, AC.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, AC.currentTime + 0.18);
    o.start(); o.stop(AC.currentTime + 0.2);
    step++;
    bgNodes.push(setTimeout(playNote, 200));
  }
  playNote();
}
function stopMusic() { bgNodes.forEach(clearTimeout); bgNodes = []; }

// ─── Canvas setup ────────────────────────────────────────────────────────
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
let W, H;

function resize() {
  const maxW = Math.min(window.innerWidth - 4, 480);
  const maxH = window.innerHeight - (isMobile() ? 100 : 0) - 50;
  const ratio = 4 / 3;
  if (maxW / maxH > ratio) { H = maxH; W = H * ratio; }
  else { W = maxW; H = W / ratio; }
  canvas.width  = W;
  canvas.height = H;
}
function isMobile() { return window.matchMedia('(max-width:700px)').matches || 'ontouchstart' in window; }

// ─── Game State ──────────────────────────────────────────────────────────
let state = 'start'; // start | playing | paused | over
let score, lives, objects, bullets, particles;
let spawnTimer, spawnInterval, fallSpeed;
let lastTime, nextMsg;
const PLAYER_W = 40, PLAYER_H = 40;

// Birthday messages — milestones every 15 points
// 🎈 = 5pts, ❤️ = 7pts
const MESSAGES = [
  { pts: 15,  msg: 'מזל טוב עומר! 🎂',       sub: '' },
  { pts: 30,  msg: 'יום הולדת שמח! 🎊',       sub: '' },
  { pts: 45,  msg: 'את אלופה ⭐',              sub: '' },
  { pts: 60,  msg: 'הכי טובה בעולם 💖',       sub: '' },
  { pts: 75,  msg: '12 זה גיל מושלם ✨',       sub: '' },
  { pts: 90,  msg: '🎉 עומר בת 12 🎉',         sub: 'יום הולדת שמח!!!', special: true },
];
const EXTRA_MSGS = [
  'את ממש מדהימה! 🌟','כוכבת על! 💫','חכמה וחמודה 🦋',
  'את הכי יפה! 🌸','סופר שחקנית 🏆','קסומה! 🪄',
  'את הגדולה! 👑','מחייכת יפה 😊','פרח של אבא ואמא 🌺','ילדה מוצלחת! 🎯',
];
let extraMsgIdx = 0;

function getMsgFor(pts) {
  const found = MESSAGES.find(m => m.pts === pts);
  if (found) return found;
  if (pts > 90 && (pts - 90) % 15 === 0) {
    const m = EXTRA_MSGS[extraMsgIdx % EXTRA_MSGS.length];
    extraMsgIdx++;
    return { msg: m, sub: `${pts} נקודות! 🎈` };
  }
  return null;
}

// Player
const player = {
  x: 0, y: 0, speed: 5,
  left: false, right: false,
  init() { this.x = W / 2; this.y = H - PLAYER_H - 10; },
  update(dt) {
    if (this.left)  this.x = Math.max(PLAYER_W/2, this.x - this.speed * dt * 60);
    if (this.right) this.x = Math.min(W - PLAYER_W/2, this.x + this.speed * dt * 60);
  },
  draw() {
    ctx.font = `${PLAYER_H}px serif`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('🚀', this.x, this.y);
  }
};

// ─── Init / Reset ─────────────────────────────────────────────────────────
function initGame() {
  score = 0; lives = 5;
  objects = []; bullets = []; particles = [];
  spawnInterval = 700; fallSpeed = 1.5;
  spawnTimer = 0; nextMsg = 15; extraMsgIdx = 0;
  resize();
  player.init();
  updateHUD();
  document.getElementById('hud').style.display = 'flex';
  document.getElementById('start-screen').style.display = 'none';
  document.getElementById('over-screen').style.display = 'none';
  if (isMobile()) document.getElementById('mobile-controls').style.display = 'flex';
  state = 'playing';
  lastTime = performance.now();
  startMusic();
  requestAnimationFrame(loop);
}

// ─── Main Loop ────────────────────────────────────────────────────────────
function loop(ts) {
  if (state !== 'playing') return;
  const dt = Math.min((ts - lastTime) / 1000, 0.05);
  lastTime = ts;
  update(dt);
  draw();
  requestAnimationFrame(loop);
}

function update(dt) {
  player.update(dt);

  // Spawn
  spawnTimer += dt * 1000;
  if (spawnTimer >= spawnInterval) {
    spawnTimer = 0;
    spawnInterval = Math.max(300, spawnInterval - 2);
    fallSpeed = Math.min(4.5, fallSpeed + 0.015);
    // 🎈 = 5 pts, ❤️ = 7 pts
    const types = [
      { emoji: '🎈', pts: 5 },
      { emoji: '❤️', pts: 7 },
      { emoji: '🎈', pts: 5 },
      { emoji: '❤️', pts: 7 },
      { emoji: '🎈', pts: 5 },
    ];
    // Spawn 2–3 objects per wave, spread across the width
    const count = 2 + Math.floor(Math.random() * 2); // 2 or 3
    const segment = (W - 40) / count;
    for (let k = 0; k < count; k++) {
      const t = types[Math.floor(Math.random() * types.length)];
      objects.push({
        x: 20 + segment * k + Math.random() * segment,
        y: -30 - k * 12, // slight stagger so they don't overlap on entry
        emoji: t.emoji,
        pts: t.pts,
        size: 30 + Math.random() * 10,
        speed: fallSpeed + Math.random() * 0.5,
      });
    }
  }

  // Bullets
  bullets.forEach(b => b.y -= 8);
  bullets = bullets.filter(b => b.y > 0);

  // Objects
  for (let i = objects.length - 1; i >= 0; i--) {
    const o = objects[i];
    o.y += o.speed * dt * 60;

    // Hit by bullet?
    let hit = false;
    for (let j = bullets.length - 1; j >= 0; j--) {
      const b = bullets[j];
      const dx = b.x - o.x, dy = b.y - o.y;
      if (Math.sqrt(dx*dx + dy*dy) < o.size * 0.7) {
        bullets.splice(j, 1);
        spawnParticles(o.x, o.y);
        sfxHit();
        score += o.pts; // 🎈=5, ❤️=7
        updateHUD();
        checkMilestone();
        hit = true;
        break;
      }
    }
    if (hit) { objects.splice(i, 1); continue; }

    // Reached bottom?
    if (o.y > H + 10) {
      objects.splice(i, 1);
      lives--;
      sfxMiss();
      updateHUD();
      if (lives <= 0) { gameOver(); return; }
    }
  }

  // Particles
  particles.forEach(p => { p.x += p.vx; p.y += p.vy; p.life -= dt; });
  particles = particles.filter(p => p.life > 0);
}

function draw() {
  // Background gradient
  const grad = ctx.createLinearGradient(0, 0, 0, H);
  grad.addColorStop(0, '#050515');
  grad.addColorStop(1, '#150530');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, W, H);

  // Stars
  ctx.fillStyle = 'rgba(255,255,255,0.5)';
  // static stars via seeded positions
  for (let i = 0; i < 40; i++) {
    const sx = ((i * 137 + 50) % W);
    const sy = ((i * 97 + 20) % (H * 0.8));
    ctx.fillRect(sx, sy, 1.5, 1.5);
  }

  // Objects
  objects.forEach(o => {
    ctx.font = `${o.size}px serif`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(o.emoji, o.x, o.y);
  });

  // Bullets
  ctx.fillStyle = '#ffdd00';
  bullets.forEach(b => {
    ctx.beginPath();
    ctx.arc(b.x, b.y, 4, 0, Math.PI * 2);
    ctx.fill();
  });

  // Particles
  particles.forEach(p => {
    ctx.globalAlpha = p.life;
    ctx.fillStyle = p.color;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
    ctx.fill();
  });
  ctx.globalAlpha = 1;

  player.draw();
}

// ─── Particles ────────────────────────────────────────────────────────────
function spawnParticles(x, y) {
  const colors = ['#ff6060','#ffdd00','#60ff60','#60d0ff','#ff60ff'];
  for (let i = 0; i < 8; i++) {
    const a = (Math.PI * 2 / 8) * i;
    particles.push({
      x, y,
      vx: Math.cos(a) * (1.5 + Math.random() * 2),
      vy: Math.sin(a) * (1.5 + Math.random() * 2),
      life: 0.6 + Math.random() * 0.4,
      r: 3 + Math.random() * 3,
      color: colors[Math.floor(Math.random() * colors.length)]
    });
  }
}

// ─── HUD ─────────────────────────────────────────────────────────────────
function updateHUD() {
  document.getElementById('score-hud').textContent = score;
  document.getElementById('lives-hud').textContent = '❤️'.repeat(Math.max(0, lives));
  const rem = nextMsg - score;
  document.getElementById('next-hud').textContent = rem > 0 ? rem : '?';
}

// ─── Milestone ───────────────────────────────────────────────────────────
function checkMilestone() {
  if (score >= nextMsg) {
    const data = getMsgFor(nextMsg);
    nextMsg += 15;
    if (data) showModal(data);
  }
}

function showModal(data) {
  state = 'paused';
  stopMusic();
  sfxMilestone();
  const modal = document.getElementById('modal');
  document.getElementById('modal-msg').textContent = data.msg;
  document.getElementById('modal-sub').textContent = data.sub || '';
  modal.style.display = 'block';
  document.getElementById('ui').style.display = 'flex';
  if (data.special) startConfetti();
}

document.getElementById('modal-continue').onclick = () => {
  document.getElementById('modal').style.display = 'none';
  stopConfetti();
  state = 'playing';
  lastTime = performance.now();
  startMusic();
  requestAnimationFrame(loop);
};

// ─── Confetti ─────────────────────────────────────────────────────────────
const cc = document.getElementById('confetti-canvas');
const cctx = cc.getContext('2d');
let confettiPieces = [], confettiAnim;

function startConfetti() {
  cc.style.display = 'block';
  cc.width = window.innerWidth;
  cc.height = window.innerHeight;
  confettiPieces = [];
  const colors = ['#ff4444','#ffdd00','#44ff44','#44aaff','#ff44ff','#ff9944'];
  for (let i = 0; i < 120; i++) {
    confettiPieces.push({
      x: Math.random() * cc.width,
      y: Math.random() * cc.height - cc.height,
      w: 6 + Math.random() * 8,
      h: 4 + Math.random() * 6,
      color: colors[Math.floor(Math.random() * colors.length)],
      vx: (Math.random() - 0.5) * 3,
      vy: 2 + Math.random() * 3,
      rot: Math.random() * Math.PI * 2,
      rv: (Math.random() - 0.5) * 0.2,
    });
  }
  function animConfetti() {
    cctx.clearRect(0, 0, cc.width, cc.height);
    confettiPieces.forEach(p => {
      p.x += p.vx; p.y += p.vy; p.rot += p.rv;
      if (p.y > cc.height) p.y = -10;
      cctx.save();
      cctx.translate(p.x, p.y);
      cctx.rotate(p.rot);
      cctx.fillStyle = p.color;
      cctx.fillRect(-p.w/2, -p.h/2, p.w, p.h);
      cctx.restore();
    });
    confettiAnim = requestAnimationFrame(animConfetti);
  }
  animConfetti();
}

function stopConfetti() {
  if (confettiAnim) cancelAnimationFrame(confettiAnim);
  cc.style.display = 'none';
  cctx.clearRect(0, 0, cc.width, cc.height);
}

// ─── Game Over ────────────────────────────────────────────────────────────
function gameOver() {
  state = 'over';
  stopMusic();
  sfxGameOver();
  document.getElementById('hud').style.display = 'none';
  document.getElementById('mobile-controls').style.display = 'none';
  document.getElementById('final-score').textContent = `ניקוד סופי: ${score} 🎯`;
  document.getElementById('over-screen').style.display = 'block';
  document.getElementById('ui').style.display = 'flex';
}

// ─── Controls ─────────────────────────────────────────────────────────────
document.addEventListener('keydown', e => {
  if (state !== 'playing') {
    if ((e.key === 'Enter' || e.key === ' ') && state === 'start') {
      document.getElementById('start-btn').click();
    }
    return;
  }
  if (e.key === 'ArrowLeft')  { player.left = true; e.preventDefault(); }
  if (e.key === 'ArrowRight') { player.right = true; e.preventDefault(); }
  if (e.key === ' ') { shoot(); e.preventDefault(); }
});
document.addEventListener('keyup', e => {
  if (e.key === 'ArrowLeft')  player.left = false;
  if (e.key === 'ArrowRight') player.right = false;
});

function shoot() {
  if (state !== 'playing') return;
  if (bullets.length < 6) {
    bullets.push({ x: player.x, y: player.y - PLAYER_H / 2 });
    sfxShoot();
  }
}

// Mobile controls
function holdBtn(btn, action) {
  let interval;
  btn.addEventListener('touchstart', e => { e.preventDefault(); action(); interval = setInterval(action, 80); }, { passive: false });
  btn.addEventListener('touchend', e => { e.preventDefault(); clearInterval(interval); }, { passive: false });
  btn.addEventListener('touchcancel', e => { e.preventDefault(); clearInterval(interval); }, { passive: false });
}

document.getElementById('left-btn').addEventListener('touchstart', e => { e.preventDefault(); player.left = true; }, { passive: false });
document.getElementById('left-btn').addEventListener('touchend', e => { e.preventDefault(); player.left = false; }, { passive: false });
document.getElementById('right-btn').addEventListener('touchstart', e => { e.preventDefault(); player.right = true; }, { passive: false });
document.getElementById('right-btn').addEventListener('touchend', e => { e.preventDefault(); player.right = false; }, { passive: false });
document.getElementById('shoot-btn').addEventListener('touchstart', e => { e.preventDefault(); shoot(); }, { passive: false });

// Also allow click for mobile buttons (for desktop testing)
document.getElementById('left-btn').addEventListener('mousedown', () => player.left = true);
document.getElementById('left-btn').addEventListener('mouseup', () => player.left = false);
document.getElementById('right-btn').addEventListener('mousedown', () => player.right = true);
document.getElementById('right-btn').addEventListener('mouseup', () => player.right = false);
document.getElementById('shoot-btn').addEventListener('click', shoot);

// ─── Start / Restart ─────────────────────────────────────────────────────
document.getElementById('start-btn').onclick = () => {
  document.getElementById('ui').style.display = 'none';
  if (AC.state === 'suspended') AC.resume();
  initGame();
};

document.getElementById('restart-btn').onclick = () => {
  document.getElementById('ui').style.display = 'none';
  if (AC.state === 'suspended') AC.resume();
  initGame();
};

document.getElementById('howto-btn').onclick = () => {
  const h = document.getElementById('howto');
  h.style.display = h.style.display === 'block' ? 'none' : 'block';
};

// ─── Resize ───────────────────────────────────────────────────────────────
window.addEventListener('resize', () => {
  resize();
  if (state === 'playing' || state === 'paused') player.y = H - PLAYER_H - 10;
});

// ─── Initial render ───────────────────────────────────────────────────────
resize();
// Draw a preview background
const grad0 = ctx.createLinearGradient(0,0,0,H);
grad0.addColorStop(0,'#050515'); grad0.addColorStop(1,'#150530');
ctx.fillStyle = grad0; ctx.fillRect(0,0,W,H);
</script>
